# Loki Profile Configuration
# Enable the GraphQL request logger so GRAPHQL_REQUEST lines are emitted; this
# overrides the OFF set in application-dev.properties when both profiles are
# active (spring.profiles.active=dev,loki).
#
# Destination routing lives in logback-spring.xml: a dedicated logger with
# additivity="false" sends these lines to the Loki4j push appender ONLY, keeping
# them off the server console. Setting INFO here without that wiring would print
# to the console too.
logging.level.at.mavila.computing_lab_may_2026.infrastructure.web.graphql.GraphQlRequestLoggingInterceptor=INFO

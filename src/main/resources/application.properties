# Spring Boot Application Configuration
spring.application.name=computing_lab_may_2026

# Default active profile (can be overridden via command line or environment variable)
spring.profiles.active=dev

# Server Settings (shared across all profiles)
server.port=8080

# Actuator Endpoints (shared)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# GraphQL configuration (shared)
spring.graphql.http.path=/graphql
spring.graphql.schema.printer.enabled=true


# ── Tomcat ────────────────────────────────────────────────
spring.threads.virtual.enabled=true
server.tomcat.threads.max=10000
server.tomcat.max-connections=8192
server.tomcat.accept-count=200
server.tomcat.connection-timeout=5000

# ── HikariCP ─────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
# Fail fast
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=1ms,5ms,10ms,25ms,50ms,100ms

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - gradle-cache:/home/vscode/.gradle
    ports:
      - "8080:8080"   # Spring Boot application
      - "5005:5005"   # Remote debugging
      - "8081:8081"   # Actuator (if configured separately)
    environment:
      - SPRING_PROFILES_ACTIVE=dev,loki
      # Note: Debug options are configured via Gradle bootRun --debug-jvm task
      # Setting JAVA_TOOL_OPTIONS globally causes Gradle daemon conflicts
    networks:
      - dev-network
    # Keeps container running
    command: sleep infinity

  prometheus:
    image: prom/prometheus:v3.4.0
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - dev-network
    depends_on:
      - app

  loki:
    image: grafana/loki:3.5.0
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - dev-network

  grafana:
    image: grafana/grafana:12.0.1
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - dev-network
    depends_on:
      - prometheus
      - loki

  # PostgreSQL database (optional - uncomment if needed instead of H2)
  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   environment:
  #     POSTGRES_USER: devuser
  #     POSTGRES_PASSWORD: devpassword
  #     POSTGRES_DB: computing_lab_db
  #   ports:
  #     - "5432:5432"
